<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - E-commerce</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            
            <div th:if="${param.error}" class="error-message">
                Invalid username and password.
            </div>
            <div th:if="${param.logout}" class="logout-message">
                You have been logged out.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" required autofocus placeholder="Enter your username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required placeholder="Enter your password">
                </div>
                
                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>
            
            <div style="margin-top: 2rem; font-size: 0.875rem; color: #6b7280; text-align: center;">
                <p>Test Accounts:</p>
                <p>User: <strong>user</strong> / <strong>user123</strong> (Access Frontend)</p>
                <p>Admin: <strong>admin</strong> / <strong>admin123</strong> (Access Backend)</p>
            </div>
        </div>
    </div>
</body>
</html>
